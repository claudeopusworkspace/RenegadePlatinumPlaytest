[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Legacy DeSmuME tests need .dst save states — skip by default.
# Run explicitly with: pytest tests/legacy/ -v
norecursedirs = legacy
# Mark all tests as integration (require live emulator)
markers =
    slow: marks tests as slow (auto_grind multi-iteration)
